<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>GigShield - My Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9f9f9; }
        h1, h2, h3, .plus-jakarta { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="min-h-screen text-[#1a1c1c] pb-24">
    <!-- Top Nav -->
    <header class="w-full bg-white px-6 py-4 flex items-center justify-between sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-[#005440] to-[#086b53] flex items-center justify-center">
                <span class="text-white text-sm font-bold">🛡</span>
            </div>
            <span class="plus-jakarta font-bold text-lg tracking-tight text-[#005440]">GigShield</span>
        </div>
        <div class="w-8 h-8 rounded-full bg-[#f3f3f3] flex items-center justify-center cursor-pointer overflow-hidden border border-gray-200">
            <span class="material-symbols-outlined text-gray-500 text-sm">person</span>
        </div>
    </header>

    <main class="w-full max-w-[480px] mx-auto px-6 pt-6">
        <h1 class="text-2xl font-bold mb-6 plus-jakarta">My Dashboard</h1>

        <!-- Active Shield Card -->
        <h2 class="text-sm font-bold uppercase tracking-wider text-gray-500 mb-3">Active Coverage</h2>
        <div class="w-full bg-gradient-to-br from-[#005440] to-[#086b53] rounded-3xl p-6 text-white shadow-xl relative overflow-hidden mb-8">
            <div class="absolute top-0 right-0 -mr-8 -mt-8 w-32 h-32 bg-white opacity-10 rounded-full"></div>
            <div class="relative z-10 flex justify-between items-start mb-6">
                <div>
                    <div class="text-sm opacity-80 mb-1 font-medium">Current Plan</div>
                    <div class="plus-jakarta font-bold text-2xl" id="ui-active-plan">Standard Shield</div>
                </div>
                <div class="bg-white/20 px-3 py-1 rounded-full flex items-center gap-1 backdrop-blur-sm">
                    <div class="w-2 h-2 rounded-full bg-[#40c4a7] animate-pulse"></div>
                    <span class="text-xs font-semibold">Active</span>
                </div>
            </div>

            <div class="relative z-10">
                <button onclick="window.location.href='code.html'" class="w-full bg-white/10 hover:bg-white/20 transition-colors py-3 rounded-xl font-semibold backdrop-blur-sm flex justify-center items-center gap-2 border border-white/20 text-sm">
                    <span class="material-symbols-outlined text-[18px]">upgrade</span> Upgrade Plan
                </button>
            </div>
            <!-- Glow effect -->
            <div class="absolute -bottom-10 -right-10 w-40 h-40 bg-[#40c4a7] blur-[60px] opacity-20 rounded-full"></div>
        </div>

        <!-- Quick Stats -->
        <h2 class="text-sm font-bold uppercase tracking-wider text-gray-500 mb-3">My Stats</h2>
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-center">
                <span class="material-symbols-outlined text-[#005440] mb-2" style="font-variation-settings: 'FILL' 1;">receipt_long</span>
                <span class="text-sm text-gray-500 font-medium">Claims Made</span>
                <span class="font-bold text-xl plus-jakarta text-[#1a1c1c]" id="ui-total-claims">0</span>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-center">
                <span class="material-symbols-outlined text-[#005440] mb-2" style="font-variation-settings: 'FILL' 1;">payments</span>
                <span class="text-sm text-gray-500 font-medium">Total Received</span>
                <span class="font-bold text-xl plus-jakarta text-[#1a1c1c]" id="ui-total-payout">₹0</span>
            </div>
        </div>

        <!-- Recent Claims Table/List -->
        <div class="flex justify-between items-end mb-4">
            <h2 class="text-sm font-bold uppercase tracking-wider text-gray-500">Claim History</h2>
        </div>
        
        <div id="ui-claims-container" class="space-y-3">
            <!-- Loading Skeleton -->
            <div class="animate-pulse bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
                <div>
                    <div class="h-4 bg-gray-200 rounded w-24 mb-2"></div>
                    <div class="h-3 bg-gray-100 rounded w-32"></div>
                </div>
                <div class="h-6 bg-gray-200 rounded-full w-16"></div>
            </div>
        </div>

    </main>

    <script>
        const BASE_URL = 'http://127.0.0.1:5000';
        // Mock user id context, in real app this comes from JWT/LocalStorage
        const userId = localStorage.getItem('user') || 'U01';

        function getStatusColor(status) {
            if(status.includes("approved")) return "text-green-700 bg-green-100 border-green-200";
            if(status.includes("rejected")) return "text-red-700 bg-red-100 border-red-200";
            return "text-yellow-700 bg-yellow-100 border-yellow-200"; // pending
        }

        async function initDashboard() {
            try {
                const res = await fetch(`${BASE_URL}/user/${userId}/dashboard`);
                const data = await res.json();
                
                // Update header/stats
                document.getElementById('ui-active-plan').innerText = data.active_plan;
                document.getElementById('ui-total-claims').innerText = data.stats.total_claims;
                document.getElementById('ui-total-payout').innerText = `₹${data.stats.total_payout.toLocaleString()}`;

                // Render claims
                const container = document.getElementById('ui-claims-container');
                if(!data.recent_claims || data.recent_claims.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-8 bg-white rounded-2xl border border-gray-100 shadow-sm">
                            <span class="material-symbols-outlined text-gray-300 text-4xl mb-2">inbox</span>
                            <p class="text-gray-500 font-medium">No claims found.</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = data.recent_claims.map(c => `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
                        <div>
                            <div class="font-bold plus-jakarta text-[15px]">${c.amount}</div>
                            <div class="text-xs text-gray-500 flex items-center gap-1">
                                <span class="font-mono text-[10px] bg-gray-100 px-1.5 rounded">${c.id}</span>
                                • ${c.date.split(' ')[0]} 
                            </div>
                        </div>
                        <span class="text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded-full border ${getStatusColor(c.status)}">
                            ${c.status}
                        </span>
                    </div>
                `).join('');

            } catch(e) {
                console.error("Dashboard Load Error:", e);
                document.getElementById('ui-claims-container').innerHTML = `
                    <div class="text-center py-8 bg-red-50 text-red-600 rounded-2xl border border-red-100">
                        Failed to connect to backend server. Make sure it is running on port 5000.
                    </div>
                `;
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            initDashboard();
        });
    </script>
</body>
</html>
